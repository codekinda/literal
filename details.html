<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #fff;
        width: 300px;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        text-align: center;
    }

    .card img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 2px solid coral;
    }

    .card h2 {
        margin: 10px 0 5px;
        font-size: 20px;
    }

    .card p.position {
        color: #777;
        margin-bottom: 15px;
    }

    details {
        margin-top: 10px;
        text-align: center;
    }

    summary {
        cursor: pointer;
        font-weight: bold;
        color: #007bff;
        outline: none;
    }

    details p {
        margin: 8px 0;
        font-size: 14px;
        text-align: center;
    }
</style>
</head>
<body>

<div class="card">
    <img src="profile.jpg" alt="Profile Image">
    <h2>Codekinda Cee-Jay</h2>
    <p class="position">Frontend Developer</p>

    <details>
        <summary>View Details</summary>
        <p><strong>Email:</strong> thelordofapps@gmail.com</p>
        <p><strong>Phone:</strong> +234-7047-1647-48</p>
    </details>
</div>

</body>
</html>
