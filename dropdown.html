<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdwown Menu</title>
    <style>
        .dropdown{
            position: relative;
            display: inline-block;
        }
        .dropbtn{
        background-color: #4CAF50;
        color: white;
        padding: 12px 18px;
        border: none;
        cursor: pointer;
        border-radius: 6px;
        transition: background 0.3s ease;
        }

        .dropbtn:hover {
        background-color: #45a049;
        }

        .dropdown-content{
        display: none;
        position: absolute;
        background-color: white;
        min-width: 160px;
        border-radius: 6px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        overflow: hidden;
        }

        .dropdown:hover .dropdown-content{
          display: block;  
        }

        .dropdown-content a {
        display: block;
        padding: 12px 16px;
        text-decoration: none;
        color: #333;
        transition: background 0.2s;
        }

        .dropdown-content a:hover {
        background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="dropdown">
        <button class="dropbtn">Services</button>
        <div class="dropdown-content">
            <a href="#">Coding Courses</a>
            <a href="#">AI Apps</a>
            <a href="#">Robots</a>
        </div>
    </div>
</body>
</html>
