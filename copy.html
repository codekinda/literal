<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Copy Text Example</title>
<style>
  body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial, sans-serif;
  }

  .copy-box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    display:flex;
    gap:10px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
  }

  input{
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:14px;
  }

  button{
    padding:10px 16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#3b82f6;
    color:#fff;
    font-weight:bold;
    transition:.3s;
  }

  button:hover{
    background:#2563eb;
  }

  button.copied{
    background:#22c55e;
  }
</style>
</head>
<body>

<div class="copy-box">
  <input type="text" value="Say Code" id="text">
  <button onclick="copyText()" id="btn">Copy</button>
</div>

<script>
function copyText(){
  const text = document.getElementById("text");
  const btn = document.getElementById("btn");

  navigator.clipboard.writeText(text.value).then(() => {
    btn.innerText = "Copied!";
    btn.classList.add("copied");

    setTimeout(() => {
      btn.innerText = "Copy";
      btn.classList.remove("copied");
    }, 1500);
  });
}
</script>
</body>
</html>
